version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: whatsapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whatsapp_db}
      POSTGRES_USER: ${POSTGRES_USER:-whatsapp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-whatsapp_pass_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-whatsapp_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp_network

  # Redis Cache & Celery Broker
  redis:
    image: redis:7-alpine
    container_name: whatsapp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp_network

  # FastAPI Application
  api:
    build:
      context: ./backend_fastapi
      dockerfile: Dockerfile
    container_name: whatsapp_api
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-whatsapp_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-whatsapp_db}

      # Redis
      REDIS_URL: redis://redis:6379/0

      # JWT
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}

      # WhatsApp API
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      PHONE_NUMBER_ID: ${PHONE_NUMBER_ID}
      VERIFY_TOKEN: ${VERIFY_TOKEN}
      META_APP_ID: ${META_APP_ID}

      # Internal API
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-celery-internal-key-2026}
      INTERNAL_API_URL: http://api:8000

      # App
      DEBUG: ${DEBUG:-False}
      ENVIRONMENT: ${ENVIRONMENT:-production}

      # Public URL (for WhatsApp image access)
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}

      # Frontend URL
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      # SMTP (Zoho)
      SMTP_SERVER: ${SMTP_SERVER:-smtp.zoho.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SENDER_EMAIL: ${SMTP_SENDER_EMAIL:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend_fastapi/uploads:/app/uploads
      - ./backend_fastapi/logs:/app/logs
    networks:
      - whatsapp_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker (processa webhooks em background)
  celery_worker:
    build:
      context: ./backend_fastapi
      dockerfile: Dockerfile
    container_name: whatsapp_celery_worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker -l info --concurrency=4
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-whatsapp_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-whatsapp_db}

      # Redis
      REDIS_URL: redis://redis:6379/0

      # JWT
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}

      # WhatsApp API
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      PHONE_NUMBER_ID: ${PHONE_NUMBER_ID}
      VERIFY_TOKEN: ${VERIFY_TOKEN}
      META_APP_ID: ${META_APP_ID}

      # Internal API
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-celery-internal-key-2026}
      INTERNAL_API_URL: http://api:8000

      # App
      DEBUG: ${DEBUG:-False}
      ENVIRONMENT: ${ENVIRONMENT:-production}

      # Public URL (for WhatsApp image access)
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}

      # Frontend URL
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      # SMTP (Zoho)
      SMTP_SERVER: ${SMTP_SERVER:-smtp.zoho.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SENDER_EMAIL: ${SMTP_SENDER_EMAIL:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend_fastapi/uploads:/app/uploads
      - ./backend_fastapi/logs:/app/logs
    networks:
      - whatsapp_network

  # Celery Beat (tarefas periódicas/agendadas)
  celery_beat:
    build:
      context: ./backend_fastapi
      dockerfile: Dockerfile
    container_name: whatsapp_celery_beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat -l info
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-whatsapp_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-whatsapp_db}

      # Redis
      REDIS_URL: redis://redis:6379/0

      # JWT
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}

      # WhatsApp API
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      PHONE_NUMBER_ID: ${PHONE_NUMBER_ID}
      VERIFY_TOKEN: ${VERIFY_TOKEN}
      META_APP_ID: ${META_APP_ID}

      # Internal API
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-celery-internal-key-2026}
      INTERNAL_API_URL: http://api:8000

      # App
      DEBUG: ${DEBUG:-False}
      ENVIRONMENT: ${ENVIRONMENT:-production}

      # Public URL (for WhatsApp image access)
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}

      # Frontend URL
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      # SMTP (Zoho)
      SMTP_SERVER: ${SMTP_SERVER:-smtp.zoho.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SENDER_EMAIL: ${SMTP_SENDER_EMAIL:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend_fastapi/logs:/app/logs
    networks:
      - whatsapp_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  whatsapp_network:
    driver: bridge

# Rate limit zone para API Gateway (por API key)
limit_req_zone $http_x_api_key zone=gateway_api:10m rate=10r/s;
limit_req_status 429;

server {
    listen 80;
    server_name api.yoursystem.dev.br;

    # Redirect HTTP -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.yoursystem.dev.br;

    # SSL (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/api.yoursystem.dev.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yoursystem.dev.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Upload limit
    client_max_body_size 20M;

    # ==================== INTERNAL: Validacao de Token ====================
    # Inacessivel externamente (directive "internal")
    location = /internal/validar-token {
        internal;
        proxy_pass http://127.0.0.1:8000/api/v1/internal/validar-token;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Api-Key $http_x_api_key;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
    }

    # ==================== GATEWAY: Enviar mensagens WhatsApp ====================
    location /gateway/messages {
        auth_request /internal/validar-token;
        auth_request_set $meta_token $upstream_http_x_meta_token;
        auth_request_set $phone_number_id $upstream_http_x_phone_number_id;

        proxy_pass https://graph.facebook.com/v25.0/$phone_number_id/messages;
        proxy_ssl_server_name on;
        proxy_set_header Authorization "Bearer $meta_token";
        proxy_set_header Content-Type "application/json";
        proxy_set_header Host graph.facebook.com;

        # Limpar headers sensíveis
        proxy_set_header X-Api-Key "";
        proxy_set_header Cookie "";

        proxy_buffering off;
        proxy_request_buffering off;

        limit_req zone=gateway_api burst=10 nodelay;
    }

    # ==================== GATEWAY: Upload de mídia ====================
    location /gateway/media {
        auth_request /internal/validar-token;
        auth_request_set $meta_token $upstream_http_x_meta_token;
        auth_request_set $phone_number_id $upstream_http_x_phone_number_id;

        proxy_pass https://graph.facebook.com/v25.0/$phone_number_id/media;
        proxy_ssl_server_name on;
        proxy_set_header Authorization "Bearer $meta_token";
        proxy_set_header Host graph.facebook.com;

        proxy_buffering off;
        proxy_request_buffering off;

        client_max_body_size 100M;
    }

    # ==================== WebSocket ====================
    location /api/v1/ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ==================== All other traffic -> FastAPI ====================
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
